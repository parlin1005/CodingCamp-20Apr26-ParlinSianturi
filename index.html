<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A productivity dashboard combining time management, task tracking, and quick website access">
    <title>To-Do List Life Dashboard</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <main class="dashboard" role="main">
        <!-- Time Display and Greeting Section -->
        <section class="component-card time-display" aria-label="Current time and greeting">
            <!-- Time display content will be populated by JavaScript -->
        </section>

        <!-- Focus Timer Section -->
        <section class="component-card focus-timer" aria-label="25-minute focus timer">
            <!-- Focus timer content will be populated by JavaScript -->
        </section>

        <!-- Task Management Section -->
        <section class="component-card task-manager" aria-label="Task management">
            <!-- Task management content will be populated by JavaScript -->
        </section>

        <!-- Quick Links Section -->
        <section class="component-card quick-links" aria-label="Quick website links">
            <!-- Quick links content will be populated by JavaScript -->
        </section>
    </main>

    <!-- Screen reader announcements -->
    <div id="announcements" class="sr-only" aria-live="polite" aria-atomic="true"></div>

    <script src="js/app.js"></script>
</body>
</html>
